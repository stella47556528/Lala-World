<body class="bg-slate-50 text-slate-900 pb-20" x-data="itineraryApp()">

    <!-- 標頭 -->
    <header class="bg-white pt-12 pb-8 px-6 text-center border-b border-slate-100 shadow-sm relative overflow-hidden">
        <div class="absolute -left-10 -top-10 opacity-5 text-emerald-500 rotate-12">
            <i data-lucide="map" class="w-48 h-48"></i>
        </div>
        <h1 class="text-3xl md:text-5xl font-black tracking-tighter bg-gradient-to-r from-teal-600 to-emerald-500 bg-clip-text text-transparent mb-3">
            SINGAPORE MASTER PLAN 2026
        </h1>
        <div class="flex justify-center items-center gap-2 text-slate-400 font-bold uppercase tracking-[0.2em] text-[11px]">
            <i data-lucide="calendar" class="w-4 h-4"></i>
            <span>2026/05/11 - 2026/05/15</span>
        </div>
    </header>

    <!-- 頂部導航列 -->
    <nav class="sticky top-0 z-50 bg-white/95 backdrop-blur-md py-4 border-b border-slate-100 shadow-sm">
        <div class="max-w-3xl mx-auto flex justify-between gap-2 px-6">
            <template x-for="day in days" :key="day.id">
                <button 
                    @click="activeDay = day.id"
                    :class="activeDay === day.id ? `bg-gradient-to-br ${day.themeColor} text-white shadow-md scale-105 border-transparent` : 'bg-white text-slate-400 border-slate-200 hover:bg-slate-50 hover:text-slate-600'"
                    class="flex-1 py-3 rounded-2xl text-[13px] font-black transition-all duration-300 whitespace-nowrap border"
                    x-text="'Day ' + day.id">
                </button>
            </template>
        </div>
    </nav>

    <!-- 主要內容區 -->
    <main class="max-w-3xl mx-auto px-6 py-10">
        <template x-for="day in days" :key="day.id">
            <div x-show="activeDay === day.id" 
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-y-4"
                 x-transition:enter-end="opacity-100 translate-y-0">
                
                <!-- 當日主題卡片 -->
                <div :class="`bg-gradient-to-br ${day.themeColor}`" class="p-8 md:p-10 rounded-[2.5rem] shadow-xl text-white mb-10 relative overflow-hidden">
                    <p class="text-[13px] font-bold opacity-80 uppercase tracking-[0.2em] mb-2" x-text="day.fullDate"></p>
                    <h2 class="text-2xl md:text-3xl font-black tracking-tight leading-tight" x-text="day.title"></h2>
                </div>

                <!-- 行程列表 -->
                <div class="pl-2">
                    <template x-for="(event, index) in day.events" :key="index">
                        <div class="relative pl-10 md:pl-12 mb-10 group">
                            <!-- 垂直引導線 -->
                            <div class="absolute left-[17px] md:left-[21px] top-6 bottom-[-40px] w-[3px] bg-slate-200 group-last:hidden"></div>
                            
                            <!-- 圖示 -->
                            <div class="absolute left-[-4px] md:left-0 top-1.5 w-10 h-10 md:w-11 md:h-11 rounded-full bg-white border-2 border-slate-200 flex items-center justify-center z-10 shadow-sm">
                                <span class="text-lg md:text-xl" x-text="event.icon"></span>
                            </div>

                            <!-- 行程卡片內容 -->
                            <div class="bg-white rounded-[2rem] p-5 md:p-6 border border-slate-100 shadow-sm relative transition-all hover:shadow-md">
                                
                                <!-- 導航按鈕 -->
                                <a :href="getMapsUrl(event)" target="_blank" class="absolute top-5 right-5 w-10 h-10 md:w-12 md:h-12 rounded-full bg-teal-50 flex items-center justify-center text-teal-600 active:scale-90 transition-transform shadow-sm">
                                    <i data-lucide="navigation" class="w-5 h-5 md:w-6 md:h-6"></i>
                                </a>

                                <div class="flex flex-col mb-3">
                                    <div class="flex items-center gap-3 mb-2">
                                        <span class="text-[13px] font-black text-teal-600 tracking-tight bg-teal-50/50 px-3 py-1 rounded-lg" x-text="event.time"></span>
                                        <span class="text-[12px] text-slate-400 font-bold uppercase tracking-[0.1em] bg-slate-50 px-2.5 py-1 rounded-md" x-text="event.type"></span>
                                    </div>
                                    <h3 class="text-xl font-black text-slate-800 pr-12 leading-tight" x-text="event.title"></h3>
                                </div>

                                <!-- 標籤 Tags -->
                                <div class="flex flex-wrap gap-1.5 mt-3 mb-4" x-show="event.tags && event.tags.length > 0">
                                    <template x-for="tag in event.tags">
                                        <span :class="tagStyles[tag].classes" class="inline-flex items-center px-2 py-1 rounded-full text-[11px] font-bold border shadow-sm mr-1.5">
                                            <i :data-lucide="tagStyles[tag].icon" class="w-3 h-3 mr-1.5"></i>
                                            <span x-text="tagStyles[tag].text"></span>
                                        </span>
                                    </template>
                                </div>

                                <p class="text-slate-600 text-[14px] md:text-[15px] leading-relaxed whitespace-pre-wrap mb-4 font-medium" x-html="event.desc"></p>

                                <!-- 備註 Notes -->
                                <div class="bg-slate-50 rounded-2xl p-4 md:p-5 border border-slate-100" x-show="event.notes && event.notes.length > 0">
                                    <div class="flex items-center text-[12px] font-black text-slate-400 uppercase tracking-widest mb-3">
                                        <i data-lucide="info" class="w-4 h-4 mr-2"></i> 詳細規劃與備註
                                    </div>
                                    <ul class="text-[13px] text-slate-600 space-y-3">
                                        <template x-for="(note, nIdx) in event.notes">
                                            <li class="flex gap-3 leading-relaxed font-medium">
                                                <span class="text-teal-400 flex-shrink-0 mt-0.5">•</span>
                                                <span class="flex-1" x-html="note"></span>
                                            </li>
                                        </template>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </main>

    <footer class="text-center py-12 px-6 bg-slate-50 border-t border-slate-200 mt-12">
        <div class="h-px w-16 bg-slate-200 mx-auto mb-8"></div>
        <p class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.4em]">
            Designed for Singapore Trip 2026
        </p>
    </footer>

</body>
</html>
