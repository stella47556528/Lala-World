<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>八字歲次查詢器</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4 font-sans text-slate-800">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">
    <!-- Header -->
    <div class="bg-indigo-600 px-6 py-8 text-center text-white">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-12 h-12 mx-auto mb-3 opacity-90">
        <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/>
      </svg>
      <h1 class="text-2xl font-bold tracking-wider">八字歲次查詢器</h1>
      <p class="text-indigo-200 mt-2 text-sm">輸入民國出生年份，立即解析</p>
    </div>

    <!-- Content -->
    <div class="p-6">
      <div class="mb-6 relative">
        <label for="yearInput" class="block text-sm font-semibold text-slate-600 mb-2">
          民國出生年份
        </label>
        <div class="relative">
          <input
            id="yearInput"
            type="number"
            min="1"
            placeholder="例如：80"
            class="w-full pl-12 pr-4 py-3 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all text-lg font-medium"
          />
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>
          </svg>
        </div>
      </div>

      <!-- Result Card (Hidden by default) -->
      <div id="resultCard" class="hidden bg-slate-50 rounded-xl p-5 border border-slate-100 space-y-4">
        <div class="flex items-center justify-between p-3 bg-white rounded-lg shadow-sm border border-slate-100">
          <div class="flex items-center space-x-3">
            <div class="p-2 bg-amber-100 text-amber-600 rounded-lg">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5">
                <line x1="4" x2="20" y1="9" y2="9"/><line x1="4" x2="20" y1="15" y2="15"/><line x1="10" x2="8" y1="3" y2="21"/><line x1="16" x2="14" y1="3" y2="21"/>
              </svg>
            </div>
            <span class="font-medium text-slate-600">農曆歲次</span>
          </div>
          <span id="yearName" class="text-xl font-bold text-amber-700">-</span>
        </div>

        <div class="flex items-center justify-between p-3 bg-white rounded-lg shadow-sm border border-slate-100">
          <div class="flex items-center space-x-3">
            <div class="p-2 bg-emerald-100 text-emerald-600 rounded-lg">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <span class="font-medium text-slate-600">本命生肖</span>
          </div>
          <span id="zodiacName" class="text-xl font-bold text-emerald-700">-</span>
        </div>

        <div class="flex items-center justify-between p-3 bg-white rounded-lg shadow-sm border border-slate-100">
          <div class="flex items-center space-x-3">
            <div class="p-2 bg-blue-100 text-blue-600 rounded-lg">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
            </div>
            <span class="font-medium text-slate-600">目前年齡</span>
          </div>
          <div class="text-right">
            <div class="text-lg font-bold text-blue-700"><span id="ageNum">-</span> <span class="text-sm font-normal text-slate-500">實歲</span></div>
            <div class="text-sm font-medium text-slate-500"><span id="virtualAgeNum">-</span> <span class="text-xs font-normal">虛歲</span></div>
          </div>
        </div>
        
        <div class="text-center mt-4">
          <span class="text-xs text-slate-400">＊年齡計算基準為 2026 年</span>
        </div>
      </div>

      <!-- Placeholder (Visible by default) -->
      <div id="placeholderCard" class="bg-slate-50 rounded-xl p-8 border border-slate-100 text-center border-dashed block">
        <div class="text-slate-400 mb-2 flex justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8 opacity-50">
            <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/>
          </svg>
        </div>
        <p class="text-slate-500 font-medium">請在上方輸入年份以顯示結果</p>
      </div>
    </div>
  </div>

  <script>
    const currentYear = 2026;
    const yearInput = document.getElementById('yearInput');
    const resultCard = document.getElementById('resultCard');
    const placeholderCard = document.getElementById('placeholderCard');
    
    // Result elements
    const yearNameEl = document.getElementById('yearName');
    const zodiacNameEl = document.getElementById('zodiacName');
    const ageNumEl = document.getElementById('ageNum');
    const virtualAgeNumEl = document.getElementById('virtualAgeNum');

    const stems = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
    const branches = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
    const zodiacs = ['鼠', '牛', '虎', '兔', '龍', '蛇', '馬', '羊', '猴', '雞', '狗', '豬'];

    // 處理負數餘數的問題
    const mod = (n, m) => ((n % m) + m) % m;

    yearInput.addEventListener('input', function(e) {
      const val = e.target.value;
      const numYear = parseInt(val, 10);

      if (!val || isNaN(numYear) || numYear <= 0) {
        // 隱藏結果，顯示提示
        resultCard.classList.add('hidden');
        resultCard.classList.remove('block');
        placeholderCard.classList.remove('hidden');
        placeholderCard.classList.add('block');
        return;
      }

      // 轉換並計算
      const gregorianYear = numYear + 1911;
      const stemIndex = mod(gregorianYear - 4, 10);
      const branchIndex = mod(gregorianYear - 4, 12);

      // 更新 DOM
      yearNameEl.textContent = `${stems[stemIndex]}${branches[branchIndex]}年`;
      zodiacNameEl.textContent = zodiacs[branchIndex];
      ageNumEl.textContent = currentYear - gregorianYear;
      virtualAgeNumEl.textContent = currentYear - gregorianYear + 1;

      // 顯示結果，隱藏提示
      resultCard.classList.remove('hidden');
      resultCard.classList.add('block');
      placeholderCard.classList.add('hidden');
      placeholderCard.classList.remove('block');
    });
  </script>
</body>
</html>
